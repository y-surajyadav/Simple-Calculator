<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link href="style.css" rel="stylesheet">
</head>

<body>

    <div class="body">
        <div class="container">
            <p></p>
            <button id="AC" class="operator" onclick="clk(event);">AC</button>
            <button id="bs" class="operator" onclick="clk(event);">⌫</button>
            <button id="00" class="num" onclick="clk(event);">00</button>
            <button id="/" class="operator" onclick="clk(event);">/</button>
            <button id="7" class="num" onclick="clk(event);">7</button>
            <button id="8" class="num" onclick="clk(event);">8</button>
            <button id="9" class="num" onclick="clk(event);">9</button>
            <button id="*" class="operator" onclick="clk(event);">*</button>
            <button id="4" class="num" onclick="clk(event);">4</button>
            <button id="5" class="num" onclick="clk(event);">5</button>
            <button id="6" class="num" onclick="clk(event);">6</button>
            <button id="-" class="operator" onclick="clk(event);">-</button>
            <button id="1" class="num" onclick="clk(event);">1</button>
            <button id="2" class="num" onclick="clk(event);">2</button>
            <button id="3" class="num" onclick="clk(event);">3</button>
            <button id="+" class="operator" onclick="clk(event);">+</button>
            <button id="0" class="num" onclick="clk(event);">0</button>
            <button id="." class="operator" onclick="clk(event);">.</button>
            <button id="=" class="equal operator" onclick="clk(event);">=</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
